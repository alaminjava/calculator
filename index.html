<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">   
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <!--calculator Container section-->
    <section class="calculatorSection">
        <div class="displayPart">
            <form action="" method="post">
                <input type="text" class="display" id="calcDisplayID" placeholder="0" readonly>
            </form>
        </div>
        <div class="container text-center buttonPart">
            <div class="row row1Top">
                <div class="col btnDiv box" data-value="%">%</div>
                <div class="col btnDiv box" data-value="7">7</div>
                <div class="col btnDiv box" data-value="8">8</div>
                <div class="col btnDiv box" data-value="9">9</div>
                <div class="col btnDiv box" data-value="/">÷</div>
              </div>
              
              <div class="row row2Middle">
                <div class="col btnDiv box" data-value="back">⌫</div>
                <div class="col btnDiv box" data-value="4">4</div>
                <div class="col btnDiv box" data-value="5">5</div>
                <div class="col btnDiv box" data-value="6">6</div>
                <div class="col btnDiv box" data-value="*">×</div>
              </div>
              
              <div class="row row3Middle">
                <div class="col btnDiv box" data-value="C">C</div>
                <div class="col btnDiv box" data-value="1">1</div>
                <div class="col btnDiv box" data-value="2">2</div>
                <div class="col btnDiv box" data-value="3">3</div>
                <div class="col btnDiv box" data-value="-">--</div>
                
            </div>
            
            <div class="row row4Bottom">
                <div class="col btnDiv box" data-value="CE">CE</div>
                <div class="col btnDiv box" data-value="0">0</div>
                <div class="col btnDiv box" data-value=".">.</div>
                <div class="col btnDiv box" data-value="±">±</div>
                <div class="col btnDiv box plus-big" data-value="+">+</div>

            </div>
            
            <div class="row row5Bottom justify-content-center">
                <div class="col-8 btnDiv box equal-center" data-value="=">=</div>
            </div>
            </div>
        </div>
    </section>

    


    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
