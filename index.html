<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">   
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <!--calculator Container section-->
    <section class="calculatorSection">
        <div class="displayPart">
            <form action="" method="post">
                <input type="text" class="display" placeholder="0" readonly>
            </form>
        </div>
        <div class="container text-center buttonPart">
            <div class="row row1Top">
                <div class="col btnDiv">%</div>
                <div class="col btnDiv">7</div>
                <div class="col btnDiv">8</div>
                <div class="col btnDiv">9</div>
                <div class="col btnDiv">÷</div>
              </div>
              
              <div class="row row2Middle">
                <div class="col btnDiv">⌫</div>
                <div class="col btnDiv">4</div>
                <div class="col btnDiv">5</div>
                <div class="col btnDiv">6</div>
                <div class="col btnDiv">×</div>
              </div>
              
              <div class="row row3Middle">
                <div class="col btnDiv">CE</div>
                <div class="col btnDiv">1</div>
                <div class="col btnDiv">2</div>
                <div class="col btnDiv">3</div>
                <div class="col btnDiv">−</div>
              </div>
              
              <div class="row row4Bottom">
                <div class="col btnDiv">⏻</div>
                <div class="col btnDiv">0</div>
                <div class="col btnDiv">.</div>
                <div class="col btnDiv">±</div>
                <div class="col btnDiv">C</div>
              </div>
              
              <div class="row row5Bottom">
                <div class="col btnDiv equal">=</div>
                <div class="col btnDiv">+</div>
              </div>
            </div>
        </div>
    </section>

    


    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
